  </h3>

  
    <p class="post-excerpt">你乘火車回到故鄉。 車廂裡昏暗的燈光，顫抖著拼寫出別離的感傷。窗外是多少山川歲月。傾倒的電線杆，望不到盡頭的平原，水壩，大江東去，沿著車門一直伸展向世界的盡頭。你所知道的只有這窗外的世界。多少片雪花落下，你不知道。你只知道故鄉只存在於記憶深...</p>
