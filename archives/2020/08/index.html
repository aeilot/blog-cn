  </h3>

  
    <p class="post-excerpt">隨便亂寫的，，，要拿去參加一個小比賽。。。 初夏，深夜，我卻還在熬夜趕作業。 夜裡，恍惚著，偶然向窗外望了望。多完美的一輪明月啊！ 凝視這一輪明月，它明亮，照白了月邊稀疏的雲；它潔淨，彷彿世間沒有什麼比它跟潔白如雪；它深邃，好像有不盡的秘密...</p>
